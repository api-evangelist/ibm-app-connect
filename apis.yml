aid: ibm-app-connect
name: IBM App Connect
description: >-
  IBM App Connect is an integration platform that enables organizations to
  connect applications, data, and services across cloud and on-premises
  environments. It provides low-code integration capabilities with pre-built
  connectors and a flow editor for building integration flows.
